name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_run:
    workflows: ["CI Test"]
    types: [completed]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create PKM config directory
        run: mkdir -p ~/.pkm && touch ~/.pkm/.env

      - name: Start services
        run: docker compose -f pkm-server/docker-compose.yml up -d

      - name: Wait for services
        run: sleep 5

      - name: Run tests with coverage
        run: |
          docker compose -f pkm-server/docker-compose.yml run --rm \
            -e PKM_API_BASE=http://pkm-server:7890 \
            pkm-server \
            bash -c "coverage run -m pytest tests/ -v --cov=. --cov-branch --ignore=tests/test_install.py && coverage report --show-missing"

      - name: Check coverage thresholds
        run: |
          docker compose -f pkm-server/docker-compose.yml run --rm \
            pkm-server \
            bash -c "coverage report --fail-under=75 --cov-branch --cov-fail-under=65"

      - name: Cleanup
        if: always()
        run: docker compose -f pkm-server/docker-compose.yml down

  snapshot:
    if: (github.event_name == 'workflow_run' && github.event.workflow.conclusion == 'success') || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push snapshot
        uses: docker/build-push-action@v5
        with:
          context: pkm-server
          push: true
          tags: ghcr.io/eviljoker/pkm:snapshot

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/pkm
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=true

      - name: Build and push release
        uses: docker/build-push-action@v5
        with:
          context: pkm-server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
