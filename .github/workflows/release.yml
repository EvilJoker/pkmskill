name: Build Wheel

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  snapshot:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: pip install build

      - name: Build wheel
        run: |
          cd pkm-server
          rm -rf dist/*.whl dist/*.tar.gz
          python -m build
          mv dist/*.whl dist/pkm-0.0.0-py3-none-any.whl

      - name: Create snapshot release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: snapshot
          name: Snapshot
          prerelease: true
          draft: false
          overwrite_files: true
          files: pkm-server/dist/*.whl

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: pip install build

      - name: Build wheel
        run: |
          cd pkm-server
          rm -rf dist/*.whl dist/*.tar.gz
          python -m build
          TAG=${GITHUB_REF#refs/tags/}
          mv dist/*.whl dist/pkm-release-${TAG}-py3-none-any.whl

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: pkm-server/dist/*.whl
