name: Build Wheel

on:
  push:
    branches: [main]
  push:
    tags: ['v*']

jobs:
  snapshot:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: pip install build

      - name: Build wheel
        run: cd pkm-server && python -m build

      - name: Delete old snapshot release
        run: |
          RELEASE_ID=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases" | \
            jq -r '.[] | select(.tag_name=="snapshot") | .id')
          if [ "$RELEASE_ID" != "null" ] && [ -n "$RELEASE_ID" ]; then
            curl -s -X DELETE -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID"
          fi

      - name: Create snapshot release
        run: |
          RESPONSE=$(curl -s -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            -d '{
              "tag_name": "snapshot",
              "name": "Snapshot",
              "prerelease": true,
              "draft": false
            }')
          echo "Release response: $RESPONSE"

      - name: Upload wheel to snapshot release
        run: |
          sleep 3
          UPLOAD_URL=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/snapshot" | \
            jq -r '.upload_url' | sed 's/{?name,label}//')
          echo "Upload URL: $UPLOAD_URL"
          WHEEL_FILE=$(ls pkm-server/dist/*.whl | head -1)
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            "$UPLOAD_URL?name=$(basename $WHEEL_FILE)" \
            --data-binary @"$WHEEL_FILE"

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: pip install build

      - name: Build wheel
        run: cd pkm-server && python -m build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: pkm-server/dist/*.whl
