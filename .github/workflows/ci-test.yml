name: CI Test

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_run:
    workflows: ["Build Base Image"]
    types: [completed]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run tests
        run: |
          mkdir -p ~/.pkm && touch ~/.pkm/.env
          cd pkm-server
          make test

  install-test:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Create PKM config directory
        run: mkdir -p ~/.pkm && touch ~/.pkm/.env

      - name: Run install.sh tests
        run: |
          cd pkm-server
          chmod +x install.sh
          timeout 120 ./install.sh snapshot || echo "install.sh failed as expected (TDD xfail)"

      - name: Run pytest install tests
        run: |
          docker compose -f pkm-server/docker-compose.yml up --build -d
          sleep 5
          docker compose -f pkm-server/docker-compose.yml run --rm \
            -e PKM_API_BASE=http://pkm-server:7890 \
            pkm-server \
            bash -c "pytest tests/test_install.py -v || true"
          docker compose -f pkm-server/docker-compose.yml down
