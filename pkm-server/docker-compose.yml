services:
  pkm-server:
    image: ghcr.io/eviljoker/pkm:snapshot
    container_name: pkm-server
    ports:
      - "8890:7890"
    volumes:
      - .:/app
      - ~/.pkm:/root/.pkm
      - ~/.pkm/logs:/root/.pkm/logs
    working_dir: /app
    restart: unless-stopped
    env_file:
      - ~/.pkm/.env
